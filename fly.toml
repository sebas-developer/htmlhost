app = 'html-host'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '5s'

[mounts]
  source = 'data'
  destination = '/data'

[env]
  PORT = '3000'

[[services]]
  internal_port = 3000
  protocol = 'tcp'

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50

  [[services.http_checks]]
    interval = '10s'
    timeout = '3s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'
