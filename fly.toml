app = 'html-host'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '5s'

[mounts]
  source = 'data'
  destination = '/data'

[env]
  PORT = '3000'
  DATA_DIR = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 25
    hard_limit = 100

  [[http_service.checks]]
    interval = '10s'
    timeout = '3s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'
